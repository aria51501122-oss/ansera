name: stage1-build

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Postgres image
        run: docker build -f Dockerfile.postgres -t ansera-db .

      - name: Start Postgres container
        run: |
          docker run -d --name pg-test \
            -e POSTGRES_USER=ansera \
            -e POSTGRES_PASSWORD=ansera \
            -e POSTGRES_DB=ansera \
            -v "$PWD/init-db:/docker-entrypoint-initdb.d" \
            ansera-db

      - name: Wait for Postgres ready
        run: |
          for i in $(seq 1 30); do
            if docker exec pg-test pg_isready -U ansera >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready within 60s"
          docker logs pg-test
          exit 1

      - name: Verify extensions vector and pgroonga
        run: |
          COUNT=$(docker exec pg-test psql -U ansera -d ansera -tAc \
            "SELECT count(*) FROM pg_extension WHERE extname IN ('vector','pgroonga');")
          echo "Extension count: ${COUNT}"
          if [ "${COUNT}" != "2" ]; then
            echo "Expected both vector and pgroonga to be installed"
            docker exec pg-test psql -U ansera -d ansera -c \
              "SELECT extname FROM pg_extension;"
            exit 1
          fi

      - name: Cleanup Postgres container
        if: always()
        run: docker rm -f pg-test || true

      - name: Validate docker-compose.yml syntax
        run: docker compose config -q

      - name: Validate n8n workflow JSON files
        run: |
          for f in n8n-workflows/*.json; do
            echo "Validating ${f}"
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done
