name: stage2-integration

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: .

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_FILE: /tmp/docker-compose.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Generate CPU compose file (strip GPU deploy block)
        run: |
          yq 'del(.services.ollama.deploy)' docker-compose.yml > /tmp/docker-compose.ci.yml
          echo "--- Generated compose file ---"
          cat /tmp/docker-compose.ci.yml

      - name: docker compose up
        run: docker compose -f /tmp/docker-compose.ci.yml up -d

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker exec ansera-db pg_isready -U ansera >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready within 60s"
          exit 1

      - name: Wait for n8n
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5678/healthz >/dev/null 2>&1; then
              echo "n8n ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "n8n did not become ready within 120s"
          exit 1

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Ollama did not become ready within 60s"
          exit 1

      - name: Verify DB extensions vector and pgroonga
        run: |
          COUNT=$(docker exec ansera-db psql -U ansera -d ansera -tAc \
            "SELECT count(*) FROM pg_extension WHERE extname IN ('vector','pgroonga');")
          echo "Extension count: ${COUNT}"
          if [ "${COUNT}" != "2" ]; then
            docker exec ansera-db psql -U ansera -d ansera -c \
              "SELECT extname FROM pg_extension;"
            exit 1
          fi

      - name: Verify documents table exists
        run: |
          REGCLASS=$(docker exec ansera-db psql -U ansera -d ansera -tAc \
            "SELECT to_regclass('public.documents');")
          echo "documents regclass: ${REGCLASS}"
          if [ -z "${REGCLASS}" ] || [ "${REGCLASS}" = "" ]; then
            echo "documents table not found"
            exit 1
          fi

      - name: Verify match_documents_hybrid function exists
        run: |
          COUNT=$(docker exec ansera-db psql -U ansera -d ansera -tAc \
            "SELECT count(*) FROM pg_proc WHERE proname='match_documents_hybrid';")
          echo "match_documents_hybrid count: ${COUNT}"
          if [ "${COUNT}" = "0" ]; then
            echo "match_documents_hybrid function not found"
            exit 1
          fi

      - name: Pull bge-m3 model (qwen3:8b skipped, too large for CPU runner)
        run: docker exec ansera-ollama ollama pull bge-m3

      - name: Import n8n workflows
        run: |
          docker exec --user root ansera-n8n rm -rf /tmp/n8n-workflows
          docker cp n8n-workflows ansera-n8n:/tmp/n8n-workflows
          docker exec ansera-n8n n8n import:workflow --separate --input=/tmp/n8n-workflows

      - name: Dump docker compose logs on failure
        if: failure()
        run: docker compose -f /tmp/docker-compose.ci.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f /tmp/docker-compose.ci.yml down -v
