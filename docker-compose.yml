services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: ansera-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ansera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ansera
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ansera-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.88.0
    container_name: ansera-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - ollama
    restart: unless-stopped

volumes:
  pg_data:
  ollama_data:
  n8n_data:
